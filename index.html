<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖母號主控台 - WTFairytales</title>
    <style>
        :root {
            --primary-gold: #e2b13c;
            --terminal-blue: #2c5d63;
            --text-light: #c4d1d9;
            --panel-grey: #1a1e23;
            --danger-red: #ff4444;
            --font-main: 'PingFang TC', 'Microsoft JhengHei', 'Courier New', monospace;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* 使用 Pixabay/Unsplash 免費星空資源 */
            background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            font-family: var(--font-main);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 太空艙儀表板外框 */
        .cockpit-panel {
            position: relative;
            width: 90%;
            max-width: 1000px;
            padding: 40px;
            background: linear-gradient(145deg, #2a2f35, #14171a);
            border: 4px solid #3d444d;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 儀表板裝飾按鈕 (純視覺) */
        .panel-decorations {
            display: flex;
            justify-content: space-between;
            margin-bottom: -10px;
        }

        .screw {
            width: 12px; height: 12px;
            background: #444;
            border-radius: 50%;
            box-shadow: inset 2px 2px 5px #000;
        }

        .status-light {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            background: #444;
        }
        .light-green { background: #00ff00; box-shadow: 0 0 10px #00ff00; animation: blink 2s infinite; }
        .light-red { background: var(--danger-red); box-shadow: 0 0 10px var(--danger-red); }

        /* 終端機螢幕區塊 */
        .terminal-screen {
            background: rgba(5, 10, 15, 0.95);
            border: 2px solid var(--terminal-blue);
            height: 60vh;
            padding: 30px;
            position: relative;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(44, 93, 99, 0.3);
        }

        /* 螢幕掃描線特效 */
        .terminal-screen::after {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        .subject-header {
            color: var(--primary-gold);
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 下方操作按鈕區 (實體功能鍵感) */
        .control-bay {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding-top: 10px;
        }

        .nav-btn {
            background: #222;
            border: 2px solid #444;
            color: var(--text-light);
            padding: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-btn span { font-size: 0.7rem; color: #666; margin-bottom: 5px; }

        /* 按鈕激活狀態 */
        .nav-btn:hover {
            border-color: var(--primary-gold);
            color: var(--primary-gold);
            box-shadow: 0 0 15px rgba(226, 177, 60, 0.2);
            transform: translateY(-2px);
        }

        .btn-danger { border-color: #600; }
        .btn-danger:hover { border-color: var(--danger-red); color: var(--danger-red); }

        /* RWD 適應 */
        @media (max-width: 768px) {
            body { overflow-y: auto; padding: 20px 10px; }
            .cockpit-panel { height: auto; padding: 20px; }
            .terminal-screen { height: 400px; }
            .subject-header { font-size: 1.5rem; }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .cursor { display: inline-block; width: 10px; height: 1.2rem; background: var(--primary-gold); animation: blink 1s infinite; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="cockpit-panel">
        <div class="panel-decorations">
            <div class="screw"></div>
            <div>
                <span class="status-light light-green"></span> PWR
                <span class="status-light light-green"></span> LINK
                <span class="status-light"></span> SYNC
            </div>
            <div class="screw"></div>
        </div>

        <div class="terminal-screen">
            <div style="font-size: 0.8rem; color: var(--terminal-blue); margin-bottom: 10px;">
                HAIL MARY OS / MISSION PROTOCOL v4.0.2
            </div>
            
            <h1 class="subject-header">WTFairytales</h1>
            
            <div style="line-height: 1.8; font-size: 0.95rem;">
                <p>> 正在掃描波江座（Eridani）周圍空域...</p>
                <p>> 偵測到外星文明生命特徵：<span style="color:#b388ff;">[洛基/Rocky]</span></p>
                <p>> 任務目標：確保人類與波江星文明之延續。</p>
                <p style="color: var(--primary-gold);">> 警告：能源存量 42%。</p>
                <p style="margin-top: 30px;">等待操作指令輸入<span class="cursor"></span></p>
            </div>
        </div>

        <div class="control-bay">
            <a href="website search.html" class="nav-btn">
                <span>DATABASE ACESS</span>
                搜尋程序
            </a>
            
            <a href="Chicken_v1.html" class="nav-btn">
                <span>PROJECT MGMT</span>
                貪食雞反應測驗
            </a>

            <div class="nav-btn btn-danger" onclick="alert('系統鎖定中：需要 WTFairytales 權限')">
                <span>EMERGENCY</span>
                緊急終止
            </div>
        </div>

        <div class="panel-decorations" style="margin-top: 10px;">
            <div class="screw"></div>
            <div style="font-size: 0.7rem; color: #444;">PROPERTY OF UNITED NATIONS - SPACE OPS</div>
            <div class="screw"></div>
        </div>
    </div>

</body>
</html>
